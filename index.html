<!DOCTYPE html>

<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌌 Cosmic Dash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–neon-cyan: #00f5ff;
–neon-pink: #ff006e;
–neon-purple: #8338ec;
–neon-yellow: #ffd60a;
–dark: #03001c;
–mid: #0a0a2e;
}

body {
background: var(–dark);
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: ‘Orbitron’, monospace;
touch-action: none;
}

#gameContainer {
position: relative;
width: min(400px, 100vw);
height: min(700px, 100vh);
overflow: hidden;
border: 2px solid var(–neon-cyan);
box-shadow: 0 0 40px var(–neon-cyan), inset 0 0 40px rgba(0,245,255,0.05);
border-radius: 12px;
}

canvas {
display: block;
width: 100%;
height: 100%;
}

#ui {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
}

#score {
position: absolute;
top: 20px;
left: 50%;
transform: translateX(-50%);
font-size: 2.5rem;
font-weight: 900;
color: var(–neon-cyan);
text-shadow: 0 0 20px var(–neon-cyan), 0 0 40px var(–neon-cyan);
letter-spacing: 4px;
}

#highScore {
position: absolute;
top: 70px;
left: 50%;
transform: translateX(-50%);
font-size: 0.75rem;
color: rgba(0,245,255,0.5);
letter-spacing: 2px;
white-space: nowrap;
}

#lives {
position: absolute;
top: 20px;
right: 16px;
display: flex;
gap: 6px;
}

.heart {
font-size: 1.2rem;
filter: drop-shadow(0 0 6px var(–neon-pink));
}

#overlay {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background: rgba(3,0,28,0.9);
backdrop-filter: blur(6px);
pointer-events: all;
transition: opacity 0.4s;
}

#overlay.hidden {
opacity: 0;
pointer-events: none;
}

.title {
font-size: 2.8rem;
font-weight: 900;
background: linear-gradient(135deg, var(–neon-cyan), var(–neon-pink), var(–neon-purple));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-align: center;
line-height: 1.1;
margin-bottom: 8px;
animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
0%, 100% { filter: drop-shadow(0 0 10px var(–neon-cyan)); }
50% { filter: drop-shadow(0 0 25px var(–neon-pink)); }
}

.subtitle {
font-family: ‘Rajdhani’, sans-serif;
font-size: 1rem;
color: rgba(0,245,255,0.6);
margin-bottom: 40px;
letter-spacing: 3px;
text-transform: uppercase;
}

#startBtn {
background: transparent;
border: 2px solid var(–neon-pink);
color: var(–neon-pink);
font-family: ‘Orbitron’, monospace;
font-size: 1rem;
font-weight: 700;
padding: 16px 40px;
cursor: pointer;
letter-spacing: 3px;
text-transform: uppercase;
position: relative;
overflow: hidden;
transition: all 0.3s;
box-shadow: 0 0 20px rgba(255,0,110,0.3), inset 0 0 20px rgba(255,0,110,0.05);
border-radius: 4px;
}

#startBtn:hover, #startBtn:active {
background: var(–neon-pink);
color: var(–dark);
box-shadow: 0 0 40px rgba(255,0,110,0.8);
transform: scale(1.05);
}

.final-score {
font-size: 1.2rem;
color: var(–neon-yellow);
text-shadow: 0 0 15px var(–neon-yellow);
margin-bottom: 10px;
letter-spacing: 2px;
}

.best-score {
font-size: 0.8rem;
color: rgba(255,214,10,0.6);
margin-bottom: 30px;
letter-spacing: 2px;
}

.tip {
position: absolute;
bottom: 24px;
left: 50%;
transform: translateX(-50%);
font-family: ‘Rajdhani’, sans-serif;
font-size: 0.8rem;
color: rgba(0,245,255,0.35);
white-space: nowrap;
animation: blink 1.5s ease-in-out infinite;
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

#combo {
position: absolute;
top: 110px;
left: 50%;
transform: translateX(-50%);
font-size: 0.9rem;
color: var(–neon-yellow);
text-shadow: 0 0 10px var(–neon-yellow);
letter-spacing: 2px;
opacity: 0;
transition: opacity 0.3s;
}

#combo.show { opacity: 1; }
</style>

</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="score">0</div>
    <div id="highScore">BEST: 0</div>
    <div id="lives"></div>
    <div id="combo"></div>
  </div>
  <div id="overlay">
    <div class="title">COSMIC<br>DASH</div>
    <div class="subtitle">یارییەکی کایهانی</div>
    <div class="final-score" id="finalScore" style="display:none"></div>
    <div class="best-score" id="bestScore" style="display:none"></div>
    <button id="startBtn">▶ دەست پێبکە</button>
    <div class="tip" id="tipText">دانەوە / کلیک / بپچکێنە بۆ فڕین</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

// Responsive canvas
function resize() {
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
}
resize();

const W = () => canvas.width;
const H = () => canvas.height;

// Game state
let state = 'menu'; // menu, playing, dead
let score = 0;
let highScore = parseInt(localStorage.getItem('cosmicHigh') || 0);
let combo = 0;
let lives = 3;
let frame = 0;
let gameSpeed = 1;
let invincible = 0;

// Player - a glowing spaceship
const player = {
  x: 0, y: 0,
  vy: 0,
  width: 36, height: 28,
  gravity: 0.45,
  jumpForce: -9,
  trail: [],
  angle: 0
};

// Obstacles - energy gates instead of pipes
let gates = [];
let gateTimer = 0;
let gateInterval = 120;
const gateGap = 160;

// Particles
let particles = [];
let stars = [];
let bgObjects = [];

// Generate stars
function initStars() {
  stars = [];
  bgObjects = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * 800,
      y: Math.random() * 800,
      r: Math.random() * 1.5 + 0.2,
      speed: Math.random() * 0.5 + 0.2,
      brightness: Math.random()
    });
  }
  // Nebulae
  for (let i = 0; i < 5; i++) {
    bgObjects.push({
      x: Math.random() * 800,
      y: Math.random() * 800,
      r: Math.random() * 80 + 40,
      color: ['rgba(131,56,236,', 'rgba(255,0,110,', 'rgba(0,245,255,'][Math.floor(Math.random()*3)],
      alpha: Math.random() * 0.08 + 0.02,
      speed: 0.3
    });
  }
}

function initPlayer() {
  player.x = W() * 0.25;
  player.y = H() * 0.5;
  player.vy = 0;
  player.trail = [];
  player.angle = 0;
}

function resetGame() {
  score = 0;
  combo = 0;
  lives = 3;
  frame = 0;
  gameSpeed = 1;
  gates = [];
  gateTimer = 0;
  gateInterval = 120;
  particles = [];
  invincible = 0;
  initPlayer();
  updateLives();
  document.getElementById('score').textContent = '0';
  document.getElementById('combo').classList.remove('show');
  initStars();
}

function updateLives() {
  const el = document.getElementById('lives');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = i < lives ? '💜' : '🖤';
    el.appendChild(h);
  }
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color,
      r: Math.random() * 4 + 2
    });
  }
}

function spawnGate() {
  const topH = Math.random() * (H() * 0.45) + H() * 0.1;
  const gateW = 22;
  gates.push({
    x: W() + gateW,
    topH,
    bottomY: topH + gateGap,
    w: gateW,
    passed: false,
    hue: Math.random() * 60 - 30, // color variation
    pulse: Math.random() * Math.PI * 2
  });
}

function drawShip(x, y, angle, alpha = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;

  const grd = ctx.createLinearGradient(-18, 0, 18, 0);
  grd.addColorStop(0, '#00f5ff');
  grd.addColorStop(0.5, '#8338ec');
  grd.addColorStop(1, '#ff006e');

  // Body
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(-12, -12);
  ctx.lineTo(-8, 0);
  ctx.lineTo(-12, 12);
  ctx.closePath();
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Cockpit glow
  ctx.beginPath();
  ctx.arc(4, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();

  // Engine glow
  ctx.beginPath();
  ctx.arc(-10, 0, 4, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,245,255,0.8)`;
  ctx.fill();

  ctx.restore();
}

function drawGate(g) {
  const pulse = Math.sin(g.pulse + frame * 0.05) * 0.3 + 0.7;
  const energyColor = `hsl(${180 + g.hue}, 100%, 60%)`;
  const glowColor = `hsl(${180 + g.hue}, 100%, 70%)`;

  // Top gate
  const gradient1 = ctx.createLinearGradient(g.x, 0, g.x + g.w, g.topH);
  gradient1.addColorStop(0, `hsla(${180+g.hue},100%,40%,0.9)`);
  gradient1.addColorStop(1, `hsla(${180+g.hue},100%,60%,0.95)`);
  ctx.fillStyle = gradient1;
  ctx.fillRect(g.x, 0, g.w, g.topH);

  // Bottom gate
  const gradient2 = ctx.createLinearGradient(g.x, g.bottomY, g.x + g.w, H());
  gradient2.addColorStop(0, `hsla(${180+g.hue},100%,60%,0.95)`);
  gradient2.addColorStop(1, `hsla(${180+g.hue},100%,40%,0.9)`);
  ctx.fillStyle = gradient2;
  ctx.fillRect(g.x, g.bottomY, g.w, H() - g.bottomY);

  // Energy beam at gap edges
  ctx.shadowBlur = 20 * pulse;
  ctx.shadowColor = glowColor;
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 3;

  // Top edge glow
  ctx.beginPath();
  ctx.moveTo(g.x, g.topH);
  ctx.lineTo(g.x + g.w, g.topH);
  ctx.stroke();

  // Bottom edge glow
  ctx.beginPath();
  ctx.moveTo(g.x, g.bottomY);
  ctx.lineTo(g.x + g.w, g.bottomY);
  ctx.stroke();

  // Scanlines
  ctx.shadowBlur = 0;
  ctx.strokeStyle = `rgba(255,255,255,0.1)`;
  ctx.lineWidth = 1;
  for (let y = 0; y < g.topH; y += 8) {
    ctx.beginPath();
    ctx.moveTo(g.x, y);
    ctx.lineTo(g.x + g.w, y);
    ctx.stroke();
  }
  for (let y = g.bottomY; y < H(); y += 8) {
    ctx.beginPath();
    ctx.moveTo(g.x, y);
    ctx.lineTo(g.x + g.w, y);
    ctx.stroke();
  }

  // Center energy orb in gap
  const cx = g.x + g.w / 2;
  const cy = g.topH + gateGap / 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 8 * pulse, 0, Math.PI * 2);
  const orbGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 8 * pulse);
  orbGrd.addColorStop(0, 'rgba(255,255,255,0.9)');
  orbGrd.addColorStop(1, `${glowColor.replace(')', ', 0)')}`);
  ctx.fillStyle = orbGrd;
  ctx.shadowBlur = 20;
  ctx.shadowColor = glowColor;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBackground() {
  // Deep space gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H());
  grad.addColorStop(0, '#03001c');
  grad.addColorStop(0.5, '#0a0a2e');
  grad.addColorStop(1, '#04001a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W(), H());

  // Nebulae
  for (const o of bgObjects) {
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    g.addColorStop(0, `${o.color}${o.alpha})`);
    g.addColorStop(1, `${o.color}0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fill();
    o.x -= o.speed * gameSpeed;
    if (o.x + o.r < 0) { o.x = W() + o.r; o.y = Math.random() * H(); }
  }

  // Stars
  for (const s of stars) {
    const twinkle = Math.sin(frame * 0.03 + s.brightness * 10) * 0.4 + 0.6;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
    ctx.fill();
    s.x -= s.speed * gameSpeed;
    if (s.x < 0) { s.x = W(); s.y = Math.random() * H(); }
  }
}

function drawTrail() {
  for (let i = 0; i < player.trail.length; i++) {
    const t = player.trail[i];
    const alpha = (i / player.trail.length) * 0.5;
    const r = (i / player.trail.length) * 6;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,245,255,${alpha})`;
    ctx.fill();
  }
}

function update() {
  if (state !== 'playing') return;
  frame++;
  gameSpeed = 1 + score * 0.02;

  // Player physics
  player.vy += player.gravity;
  player.y += player.vy;
  player.angle = Math.min(Math.max(player.vy * 0.04, -0.5), 0.8);

  // Trail
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 15) player.trail.shift();

  // Bounds
  if (player.y - player.height / 2 < 0) {
    player.y = player.height / 2;
    player.vy = 1;
  }
  if (player.y + player.height / 2 > H()) {
    die();
    return;
  }

  // Spawn gates
  gateTimer++;
  gateInterval = Math.max(70, 120 - score * 2);
  if (gateTimer >= gateInterval) {
    gateTimer = 0;
    spawnGate();
  }

  // Update gates
  const speed = 3.5 * gameSpeed;
  for (let i = gates.length - 1; i >= 0; i--) {
    const g = gates[i];
    g.x -= speed;
    g.pulse += 0.05;

    // Score
    if (!g.passed && g.x + g.w < player.x) {
      g.passed = true;
      score++;
      combo++;
      document.getElementById('score').textContent = score;
      if (combo >= 5) showCombo();
      spawnParticles(player.x, player.y, '#ffd60a', 8);
    }

    // Collision
    if (!invincible && g.x < player.x + player.width * 0.35 && g.x + g.w > player.x - player.width * 0.35) {
      if (player.y - player.height * 0.35 < g.topH || player.y + player.height * 0.35 > g.bottomY) {
        loseLife();
        return;
      }
    }

    if (g.x + g.w < -20) gates.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (invincible > 0) invincible--;
}

function showCombo() {
  const el = document.getElementById('combo');
  el.textContent = `✦ COMBO x${combo} ✦`;
  el.classList.add('show');
  clearTimeout(window._comboTimer);
  window._comboTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

function loseLife() {
  lives--;
  invincible = 80;
  combo = 0;
  document.getElementById('combo').classList.remove('show');
  spawnParticles(player.x, player.y, '#ff006e', 20);
  updateLives();
  if (lives <= 0) die();
}

function die() {
  state = 'dead';
  spawnParticles(player.x, player.y, '#ff006e', 30);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('cosmicHigh', highScore);
  }
  document.getElementById('highScore').textContent = `BEST: ${highScore}`;
  setTimeout(showDeathScreen, 800);
}

function showDeathScreen() {
  const overlay = document.getElementById('overlay');
  document.querySelector('.title').textContent = 'GAME\nOVER';
  document.querySelector('.title').style.fontSize = '2.2rem';
  document.getElementById('finalScore').style.display = 'block';
  document.getElementById('finalScore').textContent = `SCORE: ${score}`;
  document.getElementById('bestScore').style.display = 'block';
  document.getElementById('bestScore').textContent = `BEST: ${highScore}`;
  document.getElementById('startBtn').textContent = '▶ دووبارەی هەوڵبدەوە';
  document.getElementById('tipText').style.display = 'none';
  overlay.classList.remove('hidden');
}

function draw() {
  ctx.clearRect(0, 0, W(), H());
  drawBackground();

  if (state === 'playing' || state === 'dead') {
    drawTrail();
    for (const g of gates) drawGate(g);

    // Particles
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Ship with invincible flash
    const shipAlpha = invincible > 0 ? (Math.sin(frame * 0.4) * 0.5 + 0.5) : 1;
    drawShip(player.x, player.y, player.angle, shipAlpha);

    // Speed lines effect when fast
    if (gameSpeed > 1.5) {
      ctx.globalAlpha = (gameSpeed - 1.5) * 0.15;
      for (let i = 0; i < 5; i++) {
        const ly = Math.random() * H();
        const len = Math.random() * 60 + 20;
        ctx.strokeStyle = '#00f5ff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(Math.random() * W(), ly);
        ctx.lineTo(Math.random() * W() - len, ly);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Scanline overlay for CRT effect
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    for (let y = 0; y < H(); y += 4) {
      ctx.fillRect(0, y, W(), 2);
    }
  }
}

function jump() {
  if (state === 'playing') {
    player.vy = player.jumpForce;
    spawnParticles(player.x - 10, player.y, '#8338ec', 5);
  }
}

function startGame() {
  const overlay = document.getElementById('overlay');
  const titleEl = document.querySelector('.title');
  titleEl.innerHTML = 'COSMIC<br>DASH';
  titleEl.style.fontSize = '2.8rem';
  document.getElementById('finalScore').style.display = 'none';
  document.getElementById('bestScore').style.display = 'none';
  document.getElementById('startBtn').textContent = '▶ دەست پێبکە';
  document.getElementById('tipText').style.display = 'block';
  document.getElementById('highScore').textContent = `BEST: ${highScore}`;
  overlay.classList.add('hidden');
  resetGame();
  state = 'playing';
}

// Controls
document.getElementById('startBtn').addEventListener('click', e => {
  e.stopPropagation();
  startGame();
});
document.getElementById('startBtn').addEventListener('touchend', e => {
  e.preventDefault();
  e.stopPropagation();
  startGame();
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});

// Touch - only jump if overlay is hidden (game is active)
document.addEventListener('touchstart', e => {
  if (state === 'playing') {
    e.preventDefault();
    jump();
  }
}, { passive: false });

// Mouse click on canvas only
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  jump();
});

// Game loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
initStars();
initPlayer();
document.getElementById('highScore').textContent = `BEST: ${highScore}`;
updateLives();
loop();

// Handle resize
window.addEventListener('resize', () => {
  resize();
  if (state === 'menu') initPlayer();
});
</script>

</body>
</html>
